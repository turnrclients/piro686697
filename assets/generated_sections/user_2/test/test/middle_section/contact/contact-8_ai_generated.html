<section class="section-wrapper contact-8">
	<div class="container contact-8-container">
		<div class="row">
			<div class="col-md-6 col-sm-12 contact-8-left">
				<p class="contact-8-subtitle">WE'RE HERE TO SUPPORT YOU</p>
				<h2 class="contact-8-title">
					<strong>Consult</strong> Your <br> Training <br> Program Goals
				</h2>
				<p class="contact-8-text">
					Are you seeking premium fitness programs customized to your objectives? Contact us today.
				</p>
				<div class="contact-8-info">
					<p><span class="glyphicon glyphicon-map-marker"></span><span class="client_address">Gym Hall,1589-C,4th floor,New York </span></p>
					<p><span class="glyphicon glyphicon-envelope"></span> <span class="client_email">contactgymmail.com</span></p>
					<p><span class="glyphicon glyphicon-earphone"></span> <span class="client_mobile">+1234567890</span></p>
				</div>
			</div>
			<div class="col-md-6 col-sm-12">
				<div class="contact-8-form-box">
					<form method="POST" id="contact-form">
						<div class="row">
							<!-- Name -->
							<div class="col-lg-6 col-md-6 col-sm-12">
								<div class="form-group">
									<input type="text" class="form-control contact-8-input" placeholder="Name" name="name" required="">
								</div>
							</div>

							<!-- Email -->
							<div class="col-lg-6 col-md-6 col-sm-12">
								<div class="form-group">
									<input type="email" class="form-control contact-8-input" placeholder="Email" name="email" required="">
								</div>
							</div>

							<!-- Message -->
							<div class="col-lg-12">
								<div class="form-group">
									<textarea class="form-control contact-8-input" placeholder="Message" name="message" rows="5" required=""></textarea>
								</div>
							</div>

							<!-- Submit Button -->
							<div class="col-lg-12">
								<div class="form-group">
									<button type="button" class="btn contact-8-submit" onclick="sendEmailDataToGitHub()">
										<span class="glyphicon glyphicon-send"></span> Start a Workout
									</button>
								</div>
							</div>

							<!-- Form Message -->
							<div class="col-lg-12">
								<div class="form-group">
									<p class="form-message"></p>
								</div>
							</div>
						</div>





					</form>
				</div>
			</div>
		</div>
	</div>
</section>
